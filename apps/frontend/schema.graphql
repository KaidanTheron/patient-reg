schema {
  query: Query
  mutation: Mutation
}

type AuthLinkIssuePayload {
  expiresAt: DateTime!
  token: String!
  uuid: String!
}

"""
A date-time string at UTC, such as 2019-12-03T09:54:33Z, compliant with the date-time format.
"""
scalar DateTime

type Mutation {
  createAuthLink(createdBy: String!, patient: String!): AuthLinkIssuePayload!
}

type Query {
  validateRegistrationLink(token: String!): ValidatedRegistrationLinkPayload!
}

type ValidatedRegistrationLinkPayload {
  patient: String!
  uuid: String!
}