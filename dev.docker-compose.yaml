services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: dev.dockerfile
    environment:
      - PORT=${BACKEND_PORT} 
    volumes:
      - ./apps/backend/src:/backend/src
    ports:
      - ${BACKEND_PORT}:${BACKEND_PORT}
    depends_on:
      - db
  db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_PASSWORD: postgres
      PGPORT: ${DB_PORT}
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - ${DB_PORT}:${DB_PORT}
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: dev.dockerfile
    environment:
      - PORT=${FRONTEND_PORT}
    ports:
      - ${FRONTEND_PORT}:${FRONTEND_PORT}
    volumes:
      - ./apps/frontend/app:/frontend/app

    depends_on:
      - backend

volumes:
  # backend_dist:
  pgdata: