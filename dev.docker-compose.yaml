services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: dev.dockerfile
    environment:
      - PORT=${BACKEND_PORT} 
    # volumes:
    #   - ./apps/backend:/app
    #   - backend_dist:/app/dist
    ports:
      - ${BACKEND_PORT}:${BACKEND_PORT}
    depends_on:
      - db
  db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - 5433:5432
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: dev.dockerfile
    environment:
      - PORT=${FRONTEND_PORT}
    ports:
      - ${FRONTEND_PORT}:${FRONTEND_PORT}
    # volumes:
    #   - ./apps/frontend:/app
    #   - frontend_dist:/app/dist

    depends_on:
      - backend

volumes:
  # backend_dist:
  # frontend_dist:
  pgdata: